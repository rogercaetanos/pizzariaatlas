spring.application.name=pizzariaatlas

# SQL Server Configuration

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=pizzariaatlasdb;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=@ITB123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect


# Explicaçőes

# encrypt: (true ) Requer criptografia do cliente (false) năo requer criptografia do cliente
# trustServerCertificate: (true) Instrui o aplicativo cliente a ignorar a validaçăo do certificado SSL/TSL do servidor

# spring.jpa.hibernate.ddl-auto
   # none: Banco de dados e tabelas devem ser criados com antecedęncia
   # update: Banco de dados deve ser criado com antecedęncia, tabelas podem ser criadas com antecedęncia, as tabelas
   #         săo atualizadas pelo código (model )
   # create-drop: Banco de dados deve ser criado com antecedęncia, as tabelas săo criadas automaticamente pelo código (model)
   #          serăo excluídas toda vez que o servidor é "desligado" (interrompido)
   # create: Banco de dados deve ser criado com antecedęncia, quando o servidor "sobe", as tabelas săo recriadas, as tabelas
   #          năo serăo excluídas quando o servidor é interrompido.